name: Build iOS App

on:
  workflow_dispatch:
    inputs:
      build_id:
        description: 'Build ID from Supabase'
        required: true
      pwa_url:
        description: 'URL of the PWA to wrap'
        required: true
      apple_team_id:
        description: 'Apple Development Team ID'
        required: true
      certificate_url:
        description: 'Direct URL to download p12 certificate'
        required: true
      profile_url:
        description: 'Direct URL to download provisioning profile'
        required: true
      certificate_password:
        description: 'Password for the p12 certificate'
        required: true
      bundle_id:
        description: 'App bundle ID'
        required: true
      version_number:
        description: 'App version number'
        required: true
      build_number:
        description: 'App build number'
        required: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Build Environment
        run: |
          echo "Setting up environment..."
          cp -r templates/ios-wrapper/* .
          sed -i '' "s|{{PWA_URL}}|${{ github.event.inputs.pwa_url }}|g" FoldaaApp/ViewController.swift
          
      - name: Install Certificates
        run: |
          echo "Downloading and installing certificates..."
          curl -L -o cert.p12 "${{ github.event.inputs.certificate_url }}"
          curl -L -o profile.mobileprovision "${{ github.event.inputs.profile_url }}"
          security create-keychain -p "" build.keychain
          security list-keychains -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain -P "${{ github.event.inputs.certificate_password }}" -A
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
          
      - name: Build and Export Archive
        run: |
          echo "Building archive..."
          PROJECT_DIR=$(find . -maxdepth 3 -name "*.xcworkspace" -o -name "*.xcodeproj" | head -n 1 | xargs dirname)
          cd "$PROJECT_DIR"
          if [ -f "Info.plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ github.event.inputs.version_number }}" Info.plist || true
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.event.inputs.build_number }}" Info.plist || true
          fi
          PROJECT=$(ls *.xcodeproj | head -n 1)
          TARGET=$(xcodebuild -list -project "$PROJECT" | grep -A 1 "Targets:" | tail -n 1 | xargs)
          xcodebuild clean archive \
            -project "$PROJECT" \
            -target "$TARGET" \
            -configuration Release \
            -archivePath "$PWD/build/App.xcarchive" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${{ github.event.inputs.apple_team_id }}"
            
      - name: Export IPA
        run: |
          echo "Exporting IPA..."
          PROJECT_DIR=$(find . -maxdepth 3 -name "*.xcworkspace" -o -name "*.xcodeproj" | head -n 1 | xargs dirname)
          cd "$PROJECT_DIR"
          
          echo '<?xml version="1.0" encoding="UTF-8"?>' > ExportOptions.plist
          echo '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' >> ExportOptions.plist
          echo '<plist version="1.0">' >> ExportOptions.plist
          echo '<dict>' >> ExportOptions.plist
          echo '    <key>method</key>' >> ExportOptions.plist
          echo '    <string>app-store</string>' >> ExportOptions.plist
          echo '    <key>teamID</key>' >> ExportOptions.plist
          echo "    <string>${{ github.event.inputs.apple_team_id }}</string>" >> ExportOptions.plist
          echo '    <key>uploadBitcode</key>' >> ExportOptions.plist
          echo '    <key>false</key>' >> ExportOptions.plist
          echo '    <key>uploadSymbols</key>' >> ExportOptions.plist
          echo '    <key>true</key>' >> ExportOptions.plist
          echo '</dict>' >> ExportOptions.plist
          echo '</plist>' >> ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath "$PWD/build/App.xcarchive" \
            -exportPath "$PWD/build" \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates
            
      - name: Upload IPA to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          IPA_PATH=$(find build -name "*.ipa" | head -n 1)
          IPA_NAME="${{ github.event.inputs.build_id }}.ipa"
          curl -X POST \
            "${SUPABASE_URL}/storage/v1/object/ios-builds/${IPA_NAME}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$IPA_PATH"
          IPA_URL="${SUPABASE_URL}/storage/v1/object/public/ios-builds/${IPA_NAME}"
          curl -X PATCH \
            "${SUPABASE_URL}/rest/v1/ios_builds?id=eq.${{ github.event.inputs.build_id }}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -d "{\"status\":\"completed\",\"ipa_url\":\"$IPA_URL\",\"build_completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}"

      - name: Handle Failure
        if: failure()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -X PATCH \
            "${SUPABASE_URL}/rest/v1/ios_builds?id=eq.${{ github.event.inputs.build_id }}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -d "{\"status\":\"failed\",\"error_message\":\"Build failed in GitHub Actions\",\"build_completed_at\":\"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"}"
